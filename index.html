<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Self-Discovery Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--primary:#5B4DC7;--primary-dark:#4338A0;--primary-light:#EDE9FF;--accent:#E8567F;--bg:#FAFAFE;--bg-card:#FFF;--text:#1E1B3A;--text-muted:#6E6A85;--text-light:#A09DB5;--border:#E8E6F0;--border-light:#F0EEF6;--error:#D93B3B;--error-bg:#FEF2F2;--sel-border:#F09030;--sel-text:#D06808;--heading:'Fraunces',Georgia,serif;--body:'Source Sans 3',-apple-system,sans-serif;--radius:12px;--radius-lg:20px;--shadow-sm:0 1px 2px rgba(30,27,58,.04);--shadow:0 2px 8px rgba(30,27,58,.06),0 0 1px rgba(30,27,58,.08)}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:var(--body);color:var(--text);background:var(--bg);min-height:100vh;min-height:100svh;line-height:1.6;overflow:hidden}
body.on-results{overflow:auto}
.hero{min-height:100vh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1.5rem;background:linear-gradient(160deg,#F5F3FF 0%,#FAFAFE 40%,#FFF0F4 100%);position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(91,77,199,.06) 0%,transparent 70%);top:-200px;right:-100px;pointer-events:none}
.hero::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(232,86,127,.05) 0%,transparent 70%);bottom:-100px;left:-50px;pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--primary-light);color:var(--primary);font-size:.8rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:.45rem 1rem;border-radius:100px;margin-bottom:2rem}
.hero-badge::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--primary);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}
.hero h1{font-family:var(--heading);font-size:clamp(2.2rem,5vw,3.2rem);font-weight:700;line-height:1.15;color:var(--text);margin-bottom:1rem;max-width:600px;letter-spacing:-.02em}
.hero-sub{font-size:1.15rem;color:var(--text-muted);max-width:480px;line-height:1.7;font-weight:300;margin-bottom:.5rem}
.hero-meta{display:flex;align-items:center;gap:1.5rem;margin:2rem 0 2.5rem;font-size:.88rem;color:var(--text-light)}
.hero-meta-item{display:flex;align-items:center;gap:6px}
.hero-meta-item svg{width:16px;height:16px;color:var(--primary);opacity:.7}
.btn-hero{font-family:var(--body);font-size:1.05rem;font-weight:600;padding:1rem 2.8rem;border-radius:100px;border:none;cursor:pointer;color:#fff;background:var(--primary);box-shadow:0 4px 14px rgba(91,77,199,.35);transition:all .2s ease}
.btn-hero:hover{background:var(--primary-dark);box-shadow:0 6px 20px rgba(91,77,199,.4);transform:translateY(-1px)}
.btn-hero:active{transform:translateY(0)}
.explainer{min-height:100vh;min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem 1.5rem;background:var(--bg)}
.explainer-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem 2rem;max-width:540px;width:100%;box-shadow:var(--shadow);animation:fadeIn .5s ease}
.explainer h2{font-family:var(--heading);font-size:1.6rem;font-weight:700;margin-bottom:.5rem}
.explainer-sub{font-size:1rem;color:var(--text-muted);font-weight:300;line-height:1.65;margin-bottom:2rem}
.explainer-label{font-family:var(--heading);font-size:1rem;font-weight:600;color:var(--text);margin-bottom:1.25rem;font-style:italic}
.explainer-demo{margin-bottom:2rem}
.tri-container{position:relative;padding:0 .5rem}
.tri-numbers{display:flex;justify-content:space-between;margin-bottom:.6rem;position:relative;z-index:2}
.tri-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.9rem;color:var(--text-light);background:var(--border-light);border:2px solid var(--border);opacity:0;animation:numIn .35s ease forwards}
.tri-num:nth-child(1){animation-delay:.3s}.tri-num:nth-child(2){animation-delay:.45s}.tri-num:nth-child(3){animation-delay:.6s}.tri-num:nth-child(4){animation-delay:.75s}.tri-num:nth-child(5){animation-delay:.9s}
@keyframes numIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tri-shape{position:relative;height:28px;margin:0 18px;overflow:hidden;opacity:0;animation:triGrow .8s ease 1.15s forwards}
@keyframes triGrow{from{opacity:0;clip-path:polygon(0% 100%,0% 100%,0% 100%)}to{opacity:1;clip-path:polygon(0% 100%,100% 100%,100% 0%)}}
.tri-shape-inner{width:100%;height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));border-radius:0 4px 4px 0;clip-path:polygon(0% 100%,100% 100%,100% 0%)}
.tri-labels{display:flex;justify-content:space-between;margin-top:.6rem}
.tri-label-l,.tri-label-r{font-size:.75rem;font-weight:500;color:var(--text-light);opacity:0;animation:numIn .35s ease 1.35s forwards}
.tri-label-r{color:var(--primary);font-weight:600}
.explainer-note{font-size:.88rem;color:var(--text-muted);line-height:1.6;margin-bottom:2rem;opacity:0;animation:numIn .4s ease 1.55s forwards}
.explainer-note strong{color:var(--text);font-weight:600}
.survey-shell{max-width:700px;margin:0 auto;padding:0 1.5rem 0;min-height:100vh;min-height:100svh;display:flex;flex-direction:column}
.progress-container{padding:1.25rem 0 .75rem;flex-shrink:0}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem}
.progress-title{font-size:.78rem;font-weight:600;color:var(--text-muted);letter-spacing:.04em;text-transform:uppercase}
.progress-pct{font-size:.78rem;font-weight:600;color:var(--primary)}
.progress-track{height:6px;background:var(--border-light);border-radius:100px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:100px;transition:width .6s cubic-bezier(.25,.46,.45,.94)}
.extent-header{font-family:var(--body);font-size:1.6rem;font-weight:600;text-align:center;color:var(--text);margin:0 0 .15rem;flex-shrink:0}
.extent-header.hidden{display:none}
.extent-header.first-load{opacity:0;animation:fadeIn .4s ease .5s forwards}
.slide-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.text-section{flex:1;display:flex;flex-direction:column;justify-content:flex-end}
.scale-section{flex:1;display:flex;flex-direction:column;justify-content:flex-start;padding-top:.75rem}
.question-slide{overflow:hidden}
.question-slide.first-load{opacity:0;animation:fadeIn .4s ease 1s forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInRight{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-80px);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-fwd{animation:slideInRight .25s ease}
.slide-bwd{animation:slideInLeft .25s ease}
.item-question{font-family:var(--body);font-size:1.1rem;font-weight:500;line-height:1.5;color:var(--text);text-align:center;margin-bottom:.75rem}
.item-question-special{font-family:var(--body);font-size:.95rem;font-weight:400;line-height:1.5;color:var(--text-muted);text-align:center;margin-bottom:.35rem;font-style:italic}
.item-question-special-main{font-family:var(--body);font-size:1.1rem;font-weight:500;line-height:1.5;color:var(--text);text-align:center;margin-bottom:.75rem}
.scale-wrap{display:flex;flex-direction:column;gap:6px;max-width:400px;margin:0 auto;width:100%}
.scale-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:.7rem 1.25rem;border:2px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;transition:border-color .15s;user-select:none;position:relative;overflow:hidden;z-index:0}
.scale-btn::before{content:'';position:absolute;top:0;left:0;height:100%;width:0;z-index:-1;border-radius:inherit;transition:width .4s cubic-bezier(.25,.46,.45,.94)}
.scale-btn[data-value="0"]::before{background:#A0C8F0}
.scale-btn[data-value="1"]::before{background:linear-gradient(90deg,#E4F0FF,#D0E4FF)}
.scale-btn[data-value="2"]::before{background:linear-gradient(90deg,#E4F0FF,#C6DEFF)}
.scale-btn[data-value="3"]::before{background:linear-gradient(90deg,#E4F0FF,#B8D6FA)}
.scale-btn[data-value="4"]::before{background:linear-gradient(90deg,#E4F0FF,#AACEF5)}
.scale-btn:hover{border-color:var(--sel-border)}
.scale-btn.selected{border-color:var(--sel-border);background:var(--bg)}
.scale-btn.selected[data-value="0"]::before{width:2%}
.scale-btn.selected[data-value="1"]::before{width:25%}
.scale-btn.selected[data-value="2"]::before{width:50%}
.scale-btn.selected[data-value="3"]::before{width:75%}
.scale-btn.selected[data-value="4"]::before{width:100%}
.scale-num{font-weight:600;font-size:.95rem;color:var(--text);transition:color .15s}
.scale-lbl{font-size:.95rem;font-weight:400;color:var(--text-muted);line-height:1.3;transition:color .15s}
.scale-btn.selected .scale-num{color:var(--sel-text)}
.scale-btn.selected .scale-lbl{color:var(--sel-text)}
.nav-row{display:flex;justify-content:space-between;align-items:center;padding:1rem 0 1.5rem;flex-shrink:0;gap:1rem}
.btn-nav{font-family:var(--body);font-size:.92rem;font-weight:600;padding:.8rem 2rem;border-radius:100px;cursor:pointer;border:none;transition:all .15s ease}
.btn-next{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(91,77,199,.25)}
.btn-next:hover{background:var(--primary-dark);transform:translateY(-1px)}.btn-next:active{transform:translateY(0)}
.btn-back{background:transparent;color:var(--text-muted);border:1.5px solid var(--border)}
.btn-back:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary)}
.error-msg{background:var(--error-bg);color:var(--error);padding:.65rem 1rem;border-radius:var(--radius);font-size:.82rem;font-weight:500;margin-bottom:.5rem;display:none;border:1px solid rgba(217,59,59,.15);text-align:center}
.error-msg.visible{display:block}
.results{max-width:640px;margin:0 auto;padding:2.5rem 1.5rem 4rem;animation:fadeIn .5s ease}
.results h1{font-family:var(--heading);font-size:2rem;font-weight:700;text-align:center;margin-bottom:.5rem}
.results-sub{text-align:center;font-size:1rem;color:var(--text-muted);font-weight:300;margin-bottom:2.5rem;line-height:1.6}
.dim-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem 1.75rem;margin-bottom:.85rem;box-shadow:var(--shadow-sm)}
.dim-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.dim-name{font-family:var(--heading);font-size:1.05rem;font-weight:600}
.dim-pct{font-size:1.05rem;font-weight:700;color:var(--primary)}
.dim-desc{font-size:.78rem;color:var(--text-muted);line-height:1.5;margin-bottom:.85rem}
.dim-bar-track{height:8px;background:var(--border-light);border-radius:100px;overflow:hidden}
.dim-bar-fill{height:100%;border-radius:100px;transition:width 1.2s cubic-bezier(.25,.46,.45,.94)}
.dim-bar-fd{background:linear-gradient(90deg,#5B4DC7,#7B6FE0)}
.dim-bar-im{background:linear-gradient(90deg,#E8567F,#F08BA5)}
.dim-bar-cr{background:linear-gradient(90deg,#8B5CF6,#A78BFA)}
.dim-bar-iss{background:linear-gradient(90deg,#D97B2B,#F0A854)}
.dim-bar-iu{background:linear-gradient(90deg,#0EA5E9,#67D4F8)}
.dim-bar-as{background:linear-gradient(90deg,#DC2626,#F87171)}
.submitting-overlay{display:none;position:fixed;inset:0;background:rgba(250,250,254,.92);backdrop-filter:blur(4px);z-index:1000;align-items:center;justify-content:center;flex-direction:column}
.submitting-overlay.visible{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{margin-top:1rem;color:var(--text-muted);font-size:.9rem;font-weight:500}
@media(max-width:640px){
  .hero{padding:1.5rem 1.25rem}
  .hero h1{font-size:1.85rem}.hero-sub{font-size:1rem}
  .hero-badge{font-size:.72rem;margin-bottom:1.5rem}
  .hero-meta{flex-direction:column;gap:.5rem;margin:1.5rem 0 2rem}
  .btn-hero{padding:.9rem 2.2rem;font-size:1rem;width:100%;max-width:320px}
  .survey-shell{padding:0 .75rem 0}
  .extent-header{font-size:1.4rem}
  .item-question{font-size:1.05rem}
  .scale-btn{padding:.6rem 1rem}
  .scale-num{font-size:.88rem}.scale-lbl{font-size:.88rem}
  .btn-nav{padding:.7rem 1.5rem;font-size:.85rem}
  .explainer{padding:1.5rem 1.25rem}
  .explainer-card{padding:1.75rem 1.25rem}
  .tri-num{width:30px;height:30px;font-size:.78rem}
  .results{padding:1.5rem 1rem 3rem}
  .results h1{font-size:1.6rem}
  .dim-card{padding:1.1rem .9rem}.dim-name{font-size:.95rem}
}
@media(max-width:380px){
  .hero h1{font-size:1.6rem}
  .extent-header{font-size:1.2rem}
  .item-question{font-size:.95rem}
  .scale-btn{padding:.5rem .75rem}
  .scale-lbl{font-size:.82rem}
  .tri-num{width:26px;height:26px;font-size:.72rem}
}
</style>
</head>

<script>

const SURVEY_CONFIG={

    {id:'SS2',factor:'ISS',text:'…are you rebellious?',labels:['To no extent at all','To a slight extent','To a moderate extent','To a considerable extent','To a complete extent']},
    {id:'IPM2',factor:'IM',text:'…do you hide your true intentions behind a friendly and harmless face?',labels:['To no extent at all','To a slight extent','To a moderate extent','To a considerable extent','To a complete extent']},

    {id:'ATT1',factor:'ATT',text:'…do you eat 30 pizzas a day?',labels:['To no extent at all','To a slight extent','To a moderate extent','To a considerable extent','To a complete extent']},
    {id:'CA4',factor:'CR',text:'Suppose another person was getting the blame for something you did. To what extent would you feel comfortable sitting back and letting that happen?',labels:['To no extent at all','To a slight extent','To a moderate extent','To a considerable extent','To a complete extent']},

function renderItemPage(idx){
  var item=SURVEY_CONFIG.items[idx];
  var selected=state.responses[item.id];
  var progress=Math.round(((idx+1)/TOTAL)*100);
  var isFirst=idx===0&&state.firstVisit;
  if(isFirst)state.firstVisit=false;
  var isLast=idx>=TOTAL-1;

  var isSpecial=item.text.indexOf('Suppose ')===0;
  var questionHtml;
  if(isSpecial){
    var parts=item.text.split('To what extent ');
    questionHtml='<div class="item-question-special">'+parts[0]+'</div><div class="item-question-special-main">To what extent '+parts[1]+'</div>';
  } else {
    questionHtml='<div class="item-question">'+item.text+'</div>';
  }

  var labels=item.labels;
  var scaleHtml='';
  labels.forEach(function(label,v){
    var sel=selected===v?' selected':'';
    scaleHtml+='<div class="scale-btn'+sel+'" data-item="'+item.id+'" data-value="'+v+'"><div class="scale-num">'+v+'</div><div class="scale-lbl">'+label+'</div></div>';
  });

  var headerClass=isSpecial?' hidden':'';
  if(isFirst)headerClass+=' first-load';
  var questionSlideClass=isFirst?'first-load':(state.slideDir==='bwd'?'slide-bwd':'slide-fwd');

  var html='<div class="survey-shell">';

  html+='<div class="slide-area">';
  html+='<div class="text-section">';
  html+='<div class="extent-header'+headerClass+'">To what extent\u2026</div>';
  html+='<div class="question-slide '+questionSlideClass+'">'+questionHtml+'</div>';
  html+='<div class="error-msg" id="itemError"></div>';
  html+='</div>';
  html+='<div class="scale-section"><div class="scale-wrap">'+scaleHtml+'</div></div>';
  html+='</div>';
  html+='<div class="nav-row">';
  html+='<button class="btn-nav btn-back" id="btnBack">Back</button>';
  html+='<button class="btn-nav btn-next" id="btnNext">'+(isLast?'Submit':'Continue')+'</button>';
  html+='</div></div>';
  return html;
}

function calcScores(){
  var scores={},counts={};
  CORE_FACTORS.forEach(function(f){scores[f]=0;counts[f]=0});
  SURVEY_CONFIG.items.forEach(function(item){
    if(CORE_FACTORS.indexOf(item.factor)===-1)return;
    var raw=state.responses[item.id];if(raw===undefined)return;
    scores[item.factor]+=raw;counts[item.factor]++;
  });
  var pcts={};
  CORE_FACTORS.forEach(function(f){pcts[f]=counts[f]>0?Math.round((scores[f]/(counts[f]*4))*100):0});
  return pcts;
}

function renderResults(){
  var pcts=calcScores();
  var html='<div class="results"><h1>Your Results</h1><p class="results-sub">Here\u2019s how you scored across six dimensions of personality.</p>';
  CORE_FACTORS.forEach(function(key){var dim=DIMS[key];html+='<div class="dim-card"><div class="dim-header"><span class="dim-name">'+dim.name+'</span><span class="dim-pct">'+pcts[key]+'%</span></div><div class="dim-desc">'+dim.desc+'</div><div class="dim-bar-track"><div class="dim-bar-fill '+dim.barClass+'" id="bar-'+key+'" style="width:0%"></div></div></div>'});
  html+='</div>';
  return html;
}

function animateResults(){
  var pcts=calcScores();
  CORE_FACTORS.forEach(function(key){var bar=document.getElementById('bar-'+key);if(bar)bar.style.width=pcts[key]+'%'});
}

function attachListeners(){
  var bs=document.getElementById('btnStart');
  if(bs)bs.addEventListener('click',function(){state.startTime=Date.now();state.currentPage=1;render()});
  var bg=document.getElementById('btnGotIt');
  if(bg)bg.addEventListener('click',function(){state.slideDir='fwd';state.pageStartTimes[ITEM_START]=Date.now();state.currentPage=ITEM_START;render()});
  var bb=document.getElementById('btnBack');
  if(bb)bb.addEventListener('click',function(){
    recordPageTime();state.slideDir='bwd';
    if(state.currentPage===ITEM_START){state.currentPage=1;render();return}
    state.currentPage--;state.pageStartTimes[state.currentPage]=Date.now();render();
  });
  var bn=document.getElementById('btnNext');
  if(bn)bn.addEventListener('click',function(){
    if(state.currentPage>=ITEM_START&&state.currentPage<getThankyou()){
      if(!validateItem())return;
      if(state.currentPage===getThankyou()-1){recordPageTime();submitData();return}
    }
    recordPageTime();state.slideDir='fwd';state.currentPage++;state.pageStartTimes[state.currentPage]=Date.now();render();
  });
  document.querySelectorAll('.scale-btn').forEach(function(opt){
    opt.addEventListener('click',function(){
      var itemId=opt.dataset.item,value=parseInt(opt.dataset.value);
      if(state.responses[itemId]===value){delete state.responses[itemId];opt.classList.remove('selected');return}
      state.responses[itemId]=value;
      document.querySelectorAll('.scale-btn[data-item="'+itemId+'"]').forEach(function(o){o.classList.remove('selected')});
      opt.classList.add('selected');
      var err=document.getElementById('itemError');if(err)err.classList.remove('visible');
    });
  });
}

function recordPageTime(){var st=state.pageStartTimes[state.currentPage];if(st)state.pageTimes[state.currentPage]=Math.round((Date.now()-st)/100)/10;state.pageStartTimes[state.currentPage]=Date.now()}

function validateItem(){
  var idx=state.currentPage-ITEM_START;
  var item=SURVEY_CONFIG.items[idx];
  if(state.responses[item.id]===undefined){
    var err=document.getElementById('itemError');
    if(err){err.textContent='Please answer before continuing.';err.classList.add('visible')}
    return false;
  }
  return true;
}

    itemTimes[item.id]=state.pageTimes[ITEM_START+i]||0;
  });
  var payload={respondent_id:state.respondentId,total_time_seconds:totalTime,ip_address:state.ipData.ip||'',ip_country:state.ipData.country||'',ip_city:state.ipData.city||'',isp:state.ipData.isp||'',is_vpn_or_proxy:state.ipData.is_vpn?'YES':'NO',responses:state.responses,item_times:itemTimes};
  function goToResults(){overlay.classList.remove('visible');state.currentPage=getThankyou();render()}
  if(!GOOGLE_SCRIPT_URL||GOOGLE_SCRIPT_URL==='YOUR_GOOGLE_SCRIPT_URL_HERE'){goToResults();return}
  try{
    var iframe=document.createElement('iframe');iframe.name='survey_submit_frame';iframe.style.display='none';document.body.appendChild(iframe);
    var form=document.createElement('form');form.method='POST';form.action=GOOGLE_SCRIPT_URL;form.target='survey_submit_frame';form.style.display='none';
    var input=document.createElement('input');input.type='hidden';input.name='payload';input.value=JSON.stringify(payload);
    form.appendChild(input);document.body.appendChild(form);form.submit();
    setTimeout(function(){try{document.body.removeChild(form);document.body.removeChild(iframe)}catch(e){}goToResults()},2000);
  }catch(err){goToResults()}
}

render();
</script>
</body>
</html>
